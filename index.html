<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dr. Mana Taheri — Coming soon</title>
  <meta name="description" content="manataheri.com is under construction. See you soon." />
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --ink: #1c1c1a;
      --ink-soft: #4a4a45;
      --muted: #8a8a82;
      --paper: #efe9e0;       /* warm soft grey */
      --accent: #b4543a;
      --font-serif: "Georgia", "Times New Roman", serif;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--font-sans);
      color: var(--ink);
      /* warm grey base with a faint diagonal rainbow wash */
      background:
        linear-gradient(118deg,
          transparent 24%,
          rgba(120, 170, 255, 0.22) 39%,
          rgba(125, 225, 200, 0.22) 48%,
          rgba(255, 235, 130, 0.26) 57%,
          rgba(255, 150, 200, 0.26) 66%,
          transparent 84%),
        var(--paper);
      background-attachment: fixed;
      background-repeat: no-repeat;
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
    }
    .card { max-width: 640px; }
    .brand {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      letter-spacing: .02em;
      margin-bottom: 40px;
    }
    .brand span { color: var(--accent); }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: .78rem;
      color: var(--accent);
      margin-bottom: 20px;
    }
    h1 {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: clamp(1.05rem, 4.4vw, 1.9rem);
      line-height: 1.2;
      margin: 0 0 18px;
    }
    h1 .l1 { white-space: nowrap; }
    p.lead {
      color: var(--ink-soft);
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 0;
    }
    .illus {
      display: block;
      width: clamp(180px, 45vw, 260px);
      height: auto;
      margin: 36px auto 0;
    }
    .meta {
      margin-top: 36px;
      color: var(--muted);
      font-size: .9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Mana Taheri</div>
    <p class="eyebrow">Coming soon</p>
    <h1><span class="l1">This website is under construction.</span><br />See you soon!</h1>
    <p class="lead">Something thoughtful is on its way.</p>
    <img class="illus" src="construction.png" alt="Illustration of a shovel in a mound of earth" />
    <p class="meta">Dr. Mana Taheri</p>
  </div>
</body>
</html>
