<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dr. Mana Taheri — Coming soon</title>
  <meta name="description" content="manataheri.com is under construction. See you soon." />
  <meta name="robots" content="noindex" />
  <style>
    :root {
      --ink: #1c1c1a;
      --ink-soft: #4a4a45;
      --muted: #8a8a82;
      --paper: #faf8f3;
      --accent: #b4543a;
      --font-serif: "Georgia", "Times New Roman", serif;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: var(--font-sans);
      color: var(--ink);
      background: var(--paper);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 28px;
    }
    .card { max-width: 540px; }
    .brand {
      font-family: var(--font-serif);
      font-size: 1.4rem;
      letter-spacing: .02em;
      margin-bottom: 40px;
    }
    .brand span { color: var(--accent); }
    .eyebrow {
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: .78rem;
      color: var(--accent);
      margin-bottom: 20px;
    }
    h1 {
      font-family: var(--font-serif);
      font-weight: 400;
      font-size: clamp(2rem, 6vw, 3rem);
      line-height: 1.15;
      margin: 0 0 18px;
    }
    p.lead {
      color: var(--ink-soft);
      font-size: 1.1rem;
      line-height: 1.6;
      margin: 0;
    }
    .meta {
      margin-top: 44px;
      color: var(--muted);
      font-size: .9rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Mana<span>.</span>Taheri</div>
    <p class="eyebrow">Coming soon</p>
    <h1>This website is under construction.<br />See you soon!</h1>
    <p class="lead">Something thoughtful is on its way.</p>
    <p class="meta">Dr. Mana Taheri · Berlin, Germany</p>
  </div>
</body>
</html>
